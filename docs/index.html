<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagineAI - Intent Tensor Theory</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #22c55e;
            --border: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header h1 .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        
        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .message .answer {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }
        
        .message .trace {
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }
        
        .message .trace code {
            background: var(--bg-primary);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 0.75rem;
        }
        
        /* Selection Number Badge */
        .s-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        /* Input Area */
        .input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        
        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 1rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }
        
        .input-wrapper button {
            padding: 1rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        .input-wrapper button:hover {
            opacity: 0.9;
        }
        
        .input-wrapper button:active {
            transform: scale(0.98);
        }
        
        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            padding: 1rem;
        }
        
        .loading .dots {
            display: flex;
            gap: 4px;
        }
        
        .loading .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .loading .dot:nth-child(1) { animation-delay: -0.32s; }
        .loading .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Status Bar */
        .status-bar {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }
        
        .status-bar .ready {
            color: var(--success);
        }
        
        /* Welcome Message */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        
        .welcome h2 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .welcome .equation {
            font-family: 'SF Mono', Consolas, monospace;
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            color: var(--accent);
        }
        
        .welcome .examples {
            margin-top: 1.5rem;
        }
        
        .welcome .examples button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin: 0.25rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .welcome .examples button:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>
            <span class="logo">Δ</span>
            imagineAI
        </h1>
        <p class="subtitle">Intent Tensor Theory • Formula-Driven Navigation</p>
    </header>
    
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>Welcome to imagineAI</h2>
                <p>Ask me anything. The answer emerges from mathematical constraints.</p>
                <div class="equation">
                    T* = argmin<sub>T</sub>( ||σ<sub>T</sub>||₁ + λ E<sub>T</sub> )
                </div>
                <p>788 facts • 100% accuracy • No hallucination possible</p>
                <div class="examples">
                    <p style="margin-bottom: 0.5rem;">Try asking:</p>
                    <button onclick="askExample('What is the capital of Japan?')">Capital of Japan?</button>
                    <button onclick="askExample('What is the largest planet?')">Largest planet?</button>
                    <button onclick="askExample('Who painted the Mona Lisa?')">Who painted Mona Lisa?</button>
                    <button onclick="askExample('What is the deepest lake?')">Deepest lake?</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input 
                type="text" 
                id="input" 
                placeholder="Ask me anything..." 
                disabled
                onkeypress="if(event.key === 'Enter') ask()"
            >
            <button id="sendBtn" onclick="ask()" disabled>Ask</button>
        </div>
    </div>
    
    <div class="status-bar" id="status">
        Loading imagineAI data...
    </div>

    <script>
    // =========================================================================
    // imagineAI Client-Side Solver
    // Intent Tensor Theory Implementation in JavaScript
    // =========================================================================
    
    let DATA = null;
    
    // Stop words for anchor extraction
    const STOP_WORDS = new Set([
        'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being',
        'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could',
        'should', 'may', 'might', 'must', 'shall', 'can', 'need', 'dare',
        'ought', 'used', 'to', 'of', 'in', 'for', 'on', 'with', 'at', 'by',
        'from', 'as', 'into', 'through', 'during', 'before', 'after',
        'above', 'below', 'between', 'under', 'again', 'further', 'then',
        'once', 'here', 'there', 'when', 'where', 'why', 'how', 'all',
        'each', 'few', 'more', 'most', 'other', 'some', 'such', 'no', 'nor',
        'not', 'only', 'own', 'same', 'so', 'than', 'too', 'very', 'just',
        'and', 'but', 'if', 'or', 'because', 'until', 'while', 'although',
        'this', 'that', 'these', 'those', 'am', 'i', 'me', 'my', 'myself',
        'we', 'our', 'ours', 'ourselves', 'you', 'your', 'yours', 'yourself',
        'he', 'him', 'his', 'himself', 'she', 'her', 'hers', 'herself',
        'it', 'its', 'itself', 'they', 'them', 'their', 'theirs', 'themselves',
        'what', 'which', 'who', 'whom', 'whose', 'many', 'much', 'any'
    ]);
    
    const SUPERLATIVES = new Set([
        'tallest', 'largest', 'biggest', 'longest', 'deepest',
        'smallest', 'shortest', 'fastest', 'slowest', 'highest',
        'hottest', 'coldest', 'oldest', 'newest', 'most', 'least'
    ]);
    
    const HEDGING_WORDS = new Set(['technically', 'considered', 'arguably', 'sometimes', 'often']);
    
    const ORDINAL_QUALIFIERS = new Set(['third', 'fourth', 'fifth']);
    
    const REGIONAL_QUALIFIERS = [
        'in africa', 'in asia', 'in europe', 'in north america',
        'in south america', 'in australia', 'in japan', 'in china',
        'in america', 'in the world'
    ];
    
    // =========================================================================
    // Vector Math (The Core ITT Operations)
    // =========================================================================
    
    function dot(a, b) {
        let sum = 0;
        for (let i = 0; i < a.length; i++) sum += a[i] * b[i];
        return sum;
    }
    
    function norm(v) {
        return Math.sqrt(dot(v, v));
    }
    
    function cosineSim(a, b) {
        const na = norm(a), nb = norm(b);
        if (na === 0 || nb === 0) return 0;
        return dot(a, b) / (na * nb);
    }
    
    function meanVector(vectors) {
        if (vectors.length === 0) return new Array(DATA.dim).fill(0);
        const result = new Array(DATA.dim).fill(0);
        for (const v of vectors) {
            for (let i = 0; i < DATA.dim; i++) result[i] += v[i];
        }
        for (let i = 0; i < DATA.dim; i++) result[i] /= vectors.length;
        return result;
    }
    
    // =========================================================================
    // Text Processing
    // =========================================================================
    
    function extractWords(text) {
        return text.toLowerCase().match(/\b[a-z]+\b/g) || [];
    }
    
    function stem(word) {
        if (word.endsWith('s') && word.length > 3) return word.slice(0, -1);
        return word;
    }
    
    function extractAnchors(question) {
        const words = extractWords(question);
        return words.filter(w => !STOP_WORDS.has(w) && w.length > 2);
    }
    
    function getEmbedding(word) {
        return DATA.embeddings[word] || null;
    }
    
    // =========================================================================
    // The Solver - σ-Minimization with Boundary Constraints
    // T* = argmin_T ( ||σ_T||₁ + λ E_T )
    // =========================================================================
    
    function solve(question) {
        const questionLower = question.toLowerCase();
        const questionWords = new Set(extractWords(question));
        const anchorWords = extractAnchors(question);
        
        if (anchorWords.length === 0) {
            return { answer: null, confidence: 0, trace: 'No anchors extracted' };
        }
        
        // Find candidates via inverted index (O(k) retrieval)
        const candidateScores = {};
        for (const anchor of anchorWords) {
            const indices = DATA.inverted_index[anchor] || [];
            for (const idx of indices) {
                candidateScores[idx] = (candidateScores[idx] || 0) + 1;
            }
            // Also try stemmed version
            const stemmed = stem(anchor);
            if (stemmed !== anchor) {
                const stemIndices = DATA.inverted_index[stemmed] || [];
                for (const idx of stemIndices) {
                    candidateScores[idx] = (candidateScores[idx] || 0) + 0.5;
                }
            }
        }
        
        // Sort candidates by initial score
        let candidates = Object.entries(candidateScores)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 100)
            .map(([idx]) => parseInt(idx));
        
        if (candidates.length === 0) {
            return { answer: null, confidence: 0, trace: 'No candidates found' };
        }
        
        // Compute question embedding (Φ₀)
        const anchorEmbeddings = anchorWords.map(w => getEmbedding(w)).filter(e => e);
        const questionEmb = meanVector(anchorEmbeddings);
        
        // Context detection
        const questionAsksLocation = questionWords.has('where') || questionWords.has('located');
        const questionAsksOrdinal = ['second', 'third', 'fourth', 'fifth'].some(o => questionWords.has(o));
        const questionSuperlatives = [...questionWords].filter(w => SUPERLATIVES.has(w));
        const requiresCountry = questionLower.includes('the country') || questionLower.includes('country of');
        
        // Score each candidate fact
        const scores = [];
        
        for (const idx of candidates) {
            const fact = DATA.facts[idx];
            const factEmb = DATA.fact_embeddings[idx];
            const factLower = fact.toLowerCase();
            const factWords = new Set(extractWords(fact));
            const factWordsList = extractWords(fact);
            
            // Component 1: Semantic similarity to question
            const semanticSim = cosineSim(factEmb, questionEmb);
            
            // Component 2: Anchor satisfaction (ρ_q constraint)
            let anchorScore = 0;
            let directMatches = 0;
            
            for (const anchor of anchorWords) {
                const anchorStem = stem(anchor);
                let bestMatch = 0;
                
                // Direct match (including stemmed)
                for (const word of factWordsList) {
                    const wordStem = stem(word);
                    if (anchor === word || anchorStem === wordStem) {
                        bestMatch = 1.0;
                        directMatches++;
                        break;
                    }
                }
                
                // Semantic match if no direct
                if (bestMatch < 1.0) {
                    const anchorEmb = getEmbedding(anchor);
                    if (anchorEmb) {
                        for (const word of factWordsList) {
                            const wordEmb = getEmbedding(word);
                            if (wordEmb) {
                                const sim = cosineSim(anchorEmb, wordEmb);
                                const matchScore = 1.0 / (1.0 + Math.exp(-10 * (sim - 0.3)));
                                bestMatch = Math.max(bestMatch, matchScore);
                            }
                        }
                    }
                }
                
                anchorScore += bestMatch;
            }
            anchorScore /= anchorWords.length;
            
            // Component 3: Superlative matching
            let superlativeFactor = 1.0;
            const factSuperlatives = [...factWords].filter(w => SUPERLATIVES.has(w));
            if (questionSuperlatives.length > 0) {
                const matching = questionSuperlatives.filter(s => factWords.has(s));
                if (matching.length > 0) {
                    superlativeFactor = 1.5;
                } else if (factSuperlatives.length > 0) {
                    superlativeFactor = 0.4;
                }
            }
            
            // Component 4: Qualifier penalty
            let qualifierPenalty = 1.0;
            if (!questionAsksOrdinal) {
                for (const qual of ORDINAL_QUALIFIERS) {
                    if (factWords.has(qual)) qualifierPenalty *= 0.2;
                }
                if (factWords.has('second') && !factWords.has('per')) {
                    if (factLower.includes('second tallest') || factLower.includes('second largest')) {
                        qualifierPenalty *= 0.3;
                    }
                }
            }
            
            // Component 5: Hedging penalty
            let hedgingPenalty = 1.0;
            for (const hedge of HEDGING_WORDS) {
                if (factWords.has(hedge)) hedgingPenalty *= 0.7;
            }
            
            // Component 6: Regional penalty (skip if asking location)
            let regionalPenalty = 1.0;
            if (!questionAsksLocation) {
                const questionHasRegion = REGIONAL_QUALIFIERS.some(r => 
                    anchorWords.includes(r.split(' ').pop())
                );
                if (!questionHasRegion) {
                    for (const region of REGIONAL_QUALIFIERS) {
                        if (factLower.includes(region)) {
                            regionalPenalty *= 0.6;
                            break;
                        }
                    }
                }
            }
            
            // Component 7: Country disambiguation
            let disambiguationScore = 1.0;
            
            // Proper noun detection (Port of Spain vs Spain)
            for (const anchor of anchorWords) {
                if (questionLower.includes(`of ${anchor}`)) {
                    const pattern = ` of ${anchor}`;
                    if (factLower.includes(pattern)) {
                        const parts = factLower.split(pattern);
                        if (parts[0].trim()) {
                            const lastWord = parts[0].trim().split(' ').pop();
                            const properNounIndicators = ['port', 'gulf', 'bay', 'isle', 'city', 'republic', 'kingdom', 'state', 'island'];
                            if (properNounIndicators.includes(lastWord)) {
                                disambiguationScore *= 0.1;
                            }
                        }
                    }
                }
            }
            
            if (requiresCountry && factWords.has('country')) {
                disambiguationScore *= 1.5;
            }
            
            // Combined score (σ-minimization)
            // Lower σ = higher combined score
            const combined = (
                anchorScore * 
                superlativeFactor * 
                qualifierPenalty * 
                hedgingPenalty * 
                regionalPenalty * 
                disambiguationScore +
                0.05 * (semanticSim + 1) / 2
            );
            
            scores.push({
                idx,
                fact,
                combined,
                anchorScore,
                semanticSim,
                directMatches
            });
        }
        
        // Sort by combined score (Selection Number proxy)
        scores.sort((a, b) => b.combined - a.combined);
        
        const best = scores[0];
        const S = best.combined * 20; // Scale to Selection Number range
        
        return {
            answer: best.fact,
            confidence: best.combined,
            S: S,
            trace: {
                anchors: anchorWords,
                candidates: candidates.length,
                anchorScore: best.anchorScore.toFixed(3),
                semanticSim: best.semanticSim.toFixed(3),
                directMatches: best.directMatches
            }
        };
    }
    
    // =========================================================================
    // UI Functions
    // =========================================================================
    
    function addMessage(content, type, trace = null) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();
        
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        
        if (type === 'assistant' && trace) {
            div.innerHTML = `
                <div class="answer">${content}</div>
                <div class="trace">
                    <span class="s-badge">S = ${trace.S ? trace.S.toFixed(2) : 'N/A'}</span>
                    Anchors: <code>${trace.anchors?.join(', ') || 'none'}</code> • 
                    Candidates: <code>${trace.candidates || 0}</code> •
                    σ: <code>${trace.anchorScore || '0'}</code>
                </div>
            `;
        } else {
            div.textContent = content;
        }
        
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
    
    function ask() {
        const input = document.getElementById('input');
        const question = input.value.trim();
        if (!question) return;
        
        addMessage(question, 'user');
        input.value = '';
        
        // Solve (this is synchronous - the math runs instantly)
        const result = solve(question);
        
        if (result.answer) {
            addMessage(result.answer, 'assistant', {
                S: result.S,
                anchors: result.trace.anchors,
                candidates: result.trace.candidates,
                anchorScore: result.trace.anchorScore
            });
        } else {
            addMessage("I couldn't find an answer in my knowledge base.", 'assistant', {
                anchors: result.trace.anchors || [],
                candidates: 0,
                anchorScore: '0'
            });
        }
    }
    
    function askExample(question) {
        document.getElementById('input').value = question;
        ask();
    }
    
    // =========================================================================
    // Initialization
    // =========================================================================
    
    async function init() {
        const status = document.getElementById('status');
        
        try {
            status.textContent = 'Loading knowledge base (5 MB)...';
            
            const response = await fetch('imagine_ai_data.json');
            if (!response.ok) throw new Error('Failed to load data');
            
            DATA = await response.json();
            
            status.innerHTML = `<span class="ready">●</span> Ready • ${DATA.facts.length} facts • v1.0`;
            
            document.getElementById('input').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('input').focus();
            
        } catch (error) {
            status.textContent = `Error: ${error.message}`;
            console.error(error);
        }
    }
    
    // Start
    init();
    </script>
</body>
</html>
